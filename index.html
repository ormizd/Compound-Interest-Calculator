<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { background: #0e0e0e; font-family: 'Courier Prime', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .comp-btn {
      background: transparent; border: 1px solid #2a2a2a; color: #666;
      padding: 6px 12px; font-family: 'Courier Prime', monospace;
      font-size: 11px; letter-spacing: 0.1em; cursor: pointer;
      transition: all 0.2s; border-radius: 2px;
    }
    .comp-btn:hover { border-color: #c9a96e; color: #c9a96e; }
    .comp-btn.active { background: rgba(201,169,110,0.13); border-color: #c9a96e; color: #c9a96e; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 480px) { .grid3 { grid-template-columns: 1fr; } }
    .field-wrap { margin-bottom: 22px; }
    .field-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #8a8a8a; margin-bottom: 8px; display: block; font-family: 'Courier Prime', monospace; }
    .field-input {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 3px;
      color: #f0e6d3; font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700;
      padding: 10px 14px; outline: none; transition: border-color 0.2s; appearance: none;
    }
    .field-input:focus { border-color: #c9a96e; }
    .field-input::placeholder { color: #333; }
    .tab-btn {
      background: transparent; border: none; border-bottom: 2px solid transparent;
      color: #555; font-family: 'Courier Prime', monospace; font-size: 11px;
      letter-spacing: 0.2em; text-transform: uppercase; padding: 10px 4px;
      cursor: pointer; transition: all 0.2s; margin-right: 24px;
    }
    .tab-btn:hover { color: #f0e6d3; }
    .tab-btn.active { color: #c9a96e; border-bottom-color: #c9a96e; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef } = React;

    const fmt = (n) =>
      new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);

    const fmtShort = (n) => {
      if (isNaN(n) || !isFinite(n)) return "—";
      if (n >= 1000000) return "$" + (n / 1000000).toFixed(2) + "M";
      if (n >= 1000) return "$" + (n / 1000).toFixed(1) + "K";
      return fmt(n);
    };

    function Field({ label, value, onChange, prefix, suffix, placeholder, allowDecimal }) {
      const [raw, setRaw] = useState(value === 0 ? "0" : String(value));
      const [focused, setFocused] = useState(false);
      useEffect(() => { if (!focused) setRaw(value === 0 ? "0" : String(value)); }, [value, focused]);
      const handleChange = (ev) => {
        let v = ev.target.value;
        if (allowDecimal) v = v.replace(/[^0-9.]/g, "").replace(/(\..*)\./g, "$1");
        else v = v.replace(/[^0-9]/g, "");
        setRaw(v);
      };
      const handleBlur = () => {
        setFocused(false);
        const num = allowDecimal ? parseFloat(raw) : parseInt(raw, 10);
        if (!isNaN(num) && num >= 0) { onChange(num); setRaw(String(num)); }
        else setRaw(value === 0 ? "0" : String(value));
      };
      const e = React.createElement;
      return e("div", { className: "field-wrap" },
        e("label", { className: "field-label" }, label),
        e("div", { style: { position: "relative", display: "flex", alignItems: "center" } },
          prefix && e("span", { style: { position: "absolute", left: "14px", fontFamily: "'Playfair Display', serif", fontSize: "20px", fontWeight: 700, color: "#666", pointerEvents: "none" } }, prefix),
          e("input", {
            className: "field-input", type: "text",
            inputMode: allowDecimal ? "decimal" : "numeric",
            value: raw, placeholder: placeholder || "0",
            onChange: handleChange, onFocus: () => setFocused(true), onBlur: handleBlur,
            style: { paddingLeft: prefix ? "28px" : "14px", paddingRight: suffix ? "40px" : "14px" }
          }),
          suffix && e("span", { style: { position: "absolute", right: "14px", fontFamily: "'Playfair Display', serif", fontSize: "16px", fontWeight: 700, color: "#666", pointerEvents: "none" } }, suffix)
        )
      );
    }

    function BarChart({ data, colorStart, colorEnd }) {
      const max = Math.max(...data.map(d => d.value));
      const cs = colorStart || 35, ce = colorEnd || 55;
      return React.createElement("div", { style: { display: "flex", alignItems: "flex-end", gap: "3px", height: "80px", padding: "0 2px" } },
        data.map((d, i) => {
          const h = max > 0 ? (d.value / max) * 100 : 0;
          return React.createElement("div", {
            key: i, title: d.label + ": " + fmt(d.value),
            style: {
              flex: 1, height: h + "%", minHeight: "2px",
              background: "hsl(" + (cs + (i / data.length) * (ce - cs)) + ", " + (50 + (i / data.length) * 20) + "%, " + (30 + (i / data.length) * 25) + "%)",
              borderRadius: "2px 2px 0 0",
              transition: "height 0.5s cubic-bezier(0.34,1.56,0.64,1)",
              transitionDelay: (i * 15) + "ms"
            }
          });
        })
      );
    }

    // ── Tab 1: Compound Interest Calculator ──
    function CalcTab() {
      const [principal, setPrincipal] = useState(10000);
      const [rate, setRate] = useState(7);
      const [years, setYears] = useState(20);
      const [monthly, setMonthly] = useState(200);
      const [compounding, setCompounding] = useState(12);
      const [inflation, setInflation] = useState(3);
      const inflationPresets = [
        { label: "Low", value: 2 },
        { label: "Average", value: 3 },
        { label: "High", value: 4.5 }
      ];
      const [animated, setAnimated] = useState(0);
      const animRef = useRef(null);
      const prevTotal = useRef(0);

      const n = compounding, r = rate / 100;
      const yearData = [];
      for (let y = 1; y <= years; y++) {
        const cp = principal * Math.pow(1 + r / n, n * y);
        const cf = monthly > 0 ? monthly * (Math.pow(1 + r / n, n * y) - 1) / (r / n) : 0;
        yearData.push({ label: "Year " + y, value: cp + cf });
      }
      const finalValue = yearData[years - 1] ? yearData[years - 1].value : 0;
      const totalContributions = principal + monthly * 12 * years;
      const totalInterest = finalValue - totalContributions;
      const multiplier = totalContributions > 0 ? finalValue / totalContributions : 0;
      const realValue = finalValue / Math.pow(1 + inflation / 100, years);
      const realLow = finalValue / Math.pow(1 + 2 / 100, years);
      const realHigh = finalValue / Math.pow(1 + 4.5 / 100, years);

      useEffect(() => {
        const start = prevTotal.current, end = realValue, duration = 600, startTime = performance.now();
        cancelAnimationFrame(animRef.current);
        animRef.current = requestAnimationFrame(function tick(now) {
          const t = Math.min((now - startTime) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          setAnimated(start + (end - start) * ease);
          if (t < 1) animRef.current = requestAnimationFrame(tick);
          else prevTotal.current = end;
        });
      }, [realValue]);

      const compOptions = [{ v: 1, l: "Annually" }, { v: 4, l: "Quarterly" }, { v: 12, l: "Monthly" }, { v: 365, l: "Daily" }];
      const e = React.createElement;

      return e("div", { className: "grid" },
        e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "28px" } },
          e(Field, { label: "Initial Principal", value: principal, onChange: setPrincipal, prefix: "$", placeholder: "0" }),
          e(Field, { label: "Annual Return (%)", value: rate, onChange: setRate, suffix: "%", allowDecimal: true, placeholder: "7" }),
          e(Field, { label: "Time Horizon (years)", value: years, onChange: setYears, placeholder: "20" }),
          e(Field, { label: "Monthly Addition", value: monthly, onChange: setMonthly, prefix: "$", placeholder: "0" }),
          e("div", { className: "field-wrap" },
            e("label", { className: "field-label" }, "Expected Inflation"),
            e("div", { style: { display: "flex", gap: "6px", flexWrap: "wrap", marginBottom: "10px" } },
              inflationPresets.map(p => e("button", {
                key: p.label,
                className: "comp-btn" + (inflation === p.value ? " active" : ""),
                onClick: () => setInflation(p.value)
              }, p.label + " (" + p.value + "%)"))
            ),
            e(Field, { label: "Custom (%)", value: inflation, onChange: setInflation, suffix: "%", allowDecimal: true, placeholder: "2.5" })
          ),
          e("div", null,
            e("div", { style: { fontSize: "11px", letterSpacing: "0.15em", textTransform: "uppercase", color: "#8a8a8a", marginBottom: "10px" } }, "Compounding"),
            e("div", { style: { display: "flex", gap: "6px", flexWrap: "wrap" } },
              compOptions.map(o => e("button", { key: o.v, className: "comp-btn" + (compounding === o.v ? " active" : ""), onClick: () => setCompounding(o.v) }, o.l))
            )
          )
        ),
        e("div", { style: { display: "flex", flexDirection: "column", gap: "16px" } },
          e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "28px", textAlign: "center" } },
            e("div", { style: { fontSize: "10px", letterSpacing: "0.3em", color: "#8a8a8a", textTransform: "uppercase", marginBottom: "12px" } }, "Future Value (in today's dollars)"),
            e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px, 5vw, 44px)", fontWeight: 900, color: "#c9a96e", letterSpacing: "-0.03em", lineHeight: 1 } }, fmtShort(animated)),
            e("div", { style: { marginTop: "10px" } },
              e("div", { style: { fontSize: "12px", color: "#8a8a8a", marginBottom: "6px" } },
                "Nominal future value: ", e("span", { style: { color: "#7eb8c9", fontWeight: 700 } }, fmtShort(finalValue)), " (before adjusting for " + inflation + "% inflation)"
              ),
              inflation > 0 && e("div", { style: { fontSize: "10px", color: "#555", letterSpacing: "0.05em" } },
                "Range across 2%–4.5% inflation: ", e("span", { style: { color: "#999" } }, fmtShort(realHigh) + " – " + fmtShort(realLow))
              )
            ),
            e("div", { style: { marginTop: "16px", height: "1px", background: "#1e1e1e" } }),
            e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginTop: "16px" } },
              e("div", null, e("div", { style: { fontSize: "10px", letterSpacing: "0.1em", color: "#666", marginBottom: "4px" } }, "CONTRIBUTED"), e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "16px", fontWeight: 700, color: "#f0e6d3" } }, fmtShort(totalContributions))),
              e("div", null, e("div", { style: { fontSize: "10px", letterSpacing: "0.1em", color: "#666", marginBottom: "4px" } }, "EARNED"), e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "16px", fontWeight: 700, color: "#9ec97e" } }, fmtShort(Math.max(0, totalInterest))))
            )
          ),
          e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px" } },
            e("div", { style: { fontSize: "10px", letterSpacing: "0.15em", color: "#8a8a8a", textTransform: "uppercase", marginBottom: "12px" } }, "Growth Over Time"),
            e(BarChart, { data: yearData }),
            e("div", { style: { display: "flex", justifyContent: "space-between", marginTop: "8px", fontSize: "10px", color: "#555" } },
              e("span", null, "Year 1"), e("span", null, "Year " + Math.round(years / 2)), e("span", null, "Year " + years)
            )
          ),
          e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px" } },
            e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
              e("div", { style: { fontSize: "10px", letterSpacing: "0.15em", color: "#8a8a8a", textTransform: "uppercase" } }, "Money Multiplier"),
              e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "24px", fontWeight: 900, color: "#7eb8c9" } }, multiplier > 0 ? multiplier.toFixed(2) + "×" : "—")
            ),
            e("div", { style: { marginTop: "12px", height: "6px", background: "#1e1e1e", borderRadius: "3px", overflow: "hidden", display: "flex" } },
              e("div", { style: { height: "100%", width: Math.min(finalValue > 0 ? (totalContributions / finalValue) * 100 : 100, 100) + "%", background: "#3a3020" } }),
              e("div", { style: { height: "100%", width: Math.min(finalValue > 0 ? (Math.max(0, totalInterest) / finalValue) * 100 : 0, 100) + "%", background: "linear-gradient(90deg, #9ec97e, #c9a96e)" } })
            ),
            e("div", { style: { display: "flex", gap: "16px", marginTop: "8px", fontSize: "10px" } },
              e("span", { style: { color: "#5a5040" } }, "■ Principal + Contributions"),
              e("span", { style: { color: "#9ec97e" } }, "■ Interest Earned")
            )
          )
        )
      );
    }

    // ── Tab 2: Savings Goal ──
    function GoalTab() {
      const [goal, setGoal] = useState(500000);
      const [principal, setPrincipal] = useState(0);
      const [rate, setRate] = useState(7);
      const [years, setYears] = useState(20);
      const [compounding, setCompounding] = useState(12);
      const [inflation, setInflation] = useState(3);
      const inflationPresets = [
        { label: "Low", value: 2 },
        { label: "Average", value: 3 },
        { label: "High", value: 4.5 }
      ];
      const e = React.createElement;
      const n = compounding, r = rate / 100;
      const principalFV = principal * Math.pow(1 + r / n, n * years);
      const remaining = goal - principalFV;
      const factor = Math.pow(1 + r / n, n * years) - 1;
      const monthlyNeeded = (r > 0 && factor > 0 && remaining > 0) ? remaining * (r / n) / factor : (remaining > 0 ? remaining / (years * 12) : 0);
      const weeklyNeeded = monthlyNeeded * 12 / 52;
      const annualNeeded = monthlyNeeded * 12;
      const totalContributed = principal + monthlyNeeded * 12 * years;
      const interestEarned = goal - totalContributed;
      const yearData = [];
      for (let y = 1; y <= years; y++) {
        const cp = principal * Math.pow(1 + r / n, n * y);
        const cf = monthlyNeeded > 0 ? monthlyNeeded * (Math.pow(1 + r / n, n * y) - 1) / (r / n) : 0;
        yearData.push({ label: "Year " + y, value: cp + cf });
      }
      const isValid = goal > 0 && years > 0 && rate > 0;
      const realGoal = goal / Math.pow(1 + inflation / 100, years);
      const realGoalLow = goal / Math.pow(1 + 2 / 100, years);
      const realGoalHigh = goal / Math.pow(1 + 4.5 / 100, years);
      const goalAlreadyMet = principalFV >= goal;
      const compOptions = [{ v: 1, l: "Annually" }, { v: 4, l: "Quarterly" }, { v: 12, l: "Monthly" }, { v: 365, l: "Daily" }];
      const ResultCard = (label, value, color) =>
        e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px 24px", textAlign: "center" } },
          e("div", { style: { fontSize: "10px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#8a8a8a", marginBottom: "10px" } }, label),
          e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "32px", fontWeight: 900, color: color, letterSpacing: "-0.02em" } }, value)
        );
      return e("div", { className: "grid" },
        e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "28px" } },
          e(Field, { label: "Savings Goal", value: goal, onChange: setGoal, prefix: "$", placeholder: "500000" }),
          e(Field, { label: "Starting Amount (optional)", value: principal, onChange: setPrincipal, prefix: "$", placeholder: "0" }),
          e(Field, { label: "Expected Annual Return (%)", value: rate, onChange: setRate, suffix: "%", allowDecimal: true, placeholder: "7" }),
          e(Field, { label: "Time to Reach Goal (years)", value: years, onChange: setYears, placeholder: "20" }),
          e("div", { className: "field-wrap" },
            e("label", { className: "field-label" }, "Expected Inflation"),
            e("div", { style: { display: "flex", gap: "6px", flexWrap: "wrap", marginBottom: "10px" } },
              inflationPresets.map(p => e("button", {
                key: p.label,
                className: "comp-btn" + (inflation === p.value ? " active" : ""),
                onClick: () => setInflation(p.value)
              }, p.label + " (" + p.value + "%)"))
            ),
            e(Field, { label: "Custom (%)", value: inflation, onChange: setInflation, suffix: "%", allowDecimal: true, placeholder: "2.5" })
          ),
          e("div", null,
            e("div", { style: { fontSize: "11px", letterSpacing: "0.15em", textTransform: "uppercase", color: "#8a8a8a", marginBottom: "10px" } }, "Compounding"),
            e("div", { style: { display: "flex", gap: "6px", flexWrap: "wrap" } },
              compOptions.map(o => e("button", { key: o.v, className: "comp-btn" + (compounding === o.v ? " active" : ""), onClick: () => setCompounding(o.v) }, o.l))
            )
          )
        ),
        e("div", { style: { display: "flex", flexDirection: "column", gap: "16px" } },
          goalAlreadyMet
            ? e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "28px", textAlign: "center" } },
                e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "18px", fontWeight: 700, color: "#9ec97e" } }, "🎉 Your starting amount already reaches your goal with interest!")
              )
            : e(React.Fragment, null,
                e("div", { className: "grid3" },
                  ResultCard("Weekly", isValid ? fmtShort(weeklyNeeded) : "—", "#c9a96e"),
                  ResultCard("Monthly", isValid ? fmtShort(monthlyNeeded) : "—", "#c9a96e"),
                  ResultCard("Annually", isValid ? fmtShort(annualNeeded) : "—", "#c9a96e")
                ),
                e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px 24px", textAlign: "center" } },
                  e("div", { style: { fontSize: "10px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#8a8a8a", marginBottom: "10px" } }, "Your Goal in Today's Dollars"),
                  e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "28px", fontWeight: 900, color: "#7eb8c9", letterSpacing: "-0.02em" } }, fmtShort(realGoal)),
                  e("div", { style: { fontSize: "11px", color: "#8a8a8a", marginTop: "8px" } },
                    "Your target of ", e("span", { style: { color: "#c9a96e" } }, fmtShort(goal)), " in " + years + " years will have the purchasing power of about ", e("span", { style: { color: "#7eb8c9" } }, fmtShort(realGoal)), " today, at " + inflation + "% inflation."
                  ),
                  e("div", { style: { fontSize: "10px", color: "#555", marginTop: "8px", letterSpacing: "0.05em" } },
                    "Range across 2%–4.5% inflation: ", e("span", { style: { color: "#999" } }, fmtShort(realGoalHigh) + " – " + fmtShort(realGoalLow))
                  )
                ),
                e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px 24px" } },
                  e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" } },
                    e("div", null, e("div", { style: { fontSize: "10px", letterSpacing: "0.1em", color: "#666", marginBottom: "4px" } }, "TOTAL CONTRIBUTED"), e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "16px", fontWeight: 700, color: "#f0e6d3" } }, isValid ? fmtShort(totalContributed) : "—")),
                    e("div", null, e("div", { style: { fontSize: "10px", letterSpacing: "0.1em", color: "#666", marginBottom: "4px" } }, "INTEREST EARNED"), e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "16px", fontWeight: 700, color: "#9ec97e" } }, isValid ? fmtShort(Math.max(0, interestEarned)) : "—"))
                  )
                ),
                e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px" } },
                  e("div", { style: { fontSize: "10px", letterSpacing: "0.15em", color: "#8a8a8a", textTransform: "uppercase", marginBottom: "12px" } }, "Growth Toward Goal"),
                  e(BarChart, { data: yearData }),
                  e("div", { style: { display: "flex", justifyContent: "space-between", marginTop: "8px", fontSize: "10px", color: "#555" } },
                    e("span", null, "Year 1"), e("span", null, "Year " + Math.round(years / 2)), e("span", null, "Year " + years)
                  )
                )
              )
        )
      );
    }

    // ── Tab 3: Debt Payoff Calculator ──
    function DebtTab() {
      const [balance, setBalance] = useState(15000);
      const [rate, setRate] = useState(19.99);
      const [payment, setPayment] = useState(400);
      const e = React.createElement;

      const monthlyRate = rate / 100 / 12;

      // Calculate payoff: month by month
      let months = 0, totalInterestPaid = 0, remaining = balance;
      const monthData = [];

      if (payment > 0 && balance > 0) {
        const minPayment = monthlyRate > 0 ? balance * monthlyRate * 1.01 : 1; // just above interest-only
        if (monthlyRate === 0) {
          months = Math.ceil(balance / payment);
          totalInterestPaid = 0;
          for (let m = 1; m <= Math.min(months, 360); m++) {
            remaining = Math.max(0, balance - payment * m);
            monthData.push({ label: "Mo " + m, value: remaining });
          }
        } else if (payment <= balance * monthlyRate) {
          // Payment doesn't cover interest — flag it
          months = Infinity;
        } else {
          // n = -log(1 - (r * PV / PMT)) / log(1 + r)
          months = Math.ceil(-Math.log(1 - (monthlyRate * balance / payment)) / Math.log(1 + monthlyRate));
          months = Math.min(months, 600); // cap at 50 years
          let bal = balance;
          for (let m = 1; m <= months; m++) {
            const interest = bal * monthlyRate;
            totalInterestPaid += interest;
            bal = bal + interest - payment;
            if (bal < 0) bal = 0;
            // Only push one data point per 3 months to keep chart manageable
            if (m % Math.max(1, Math.floor(months / 60)) === 0 || m === months) {
              monthData.push({ label: "Mo " + m, value: bal });
            }
          }
        }
      }

      const years = months === Infinity ? null : Math.floor(months / 12);
      const remainingMonths = months === Infinity ? null : months % 12;
      const totalPaid = months === Infinity ? null : payment * months;
      const paymentCoversInterest = monthlyRate === 0 || payment > balance * monthlyRate;
      const isValid = balance > 0 && payment > 0;
      const alreadyPaid = balance === 0;

      // Minimum payment suggestion (covers interest + 1% of principal)
      const suggestedMin = monthlyRate > 0 ? (balance * monthlyRate + balance * 0.01) : balance * 0.02;

      return e("div", { className: "grid" },
        // Left: inputs
        e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "28px" } },
          e(Field, { label: "Current Balance", value: balance, onChange: setBalance, prefix: "$", placeholder: "0" }),
          e(Field, { label: "Annual Interest Rate (%)", value: rate, onChange: setRate, suffix: "%", allowDecimal: true, placeholder: "19.99" }),
          e(Field, { label: "Monthly Payment", value: payment, onChange: setPayment, prefix: "$", placeholder: "0" }),
          // Minimum payment hint
          isValid && e("div", { style: { marginTop: "-10px", marginBottom: "20px", fontSize: "11px", color: "#555", letterSpacing: "0.05em" } },
            "Suggested minimum: ",
            e("span", { style: { color: "#c9a96e" } }, fmtShort(suggestedMin) + "/mo")
          )
        ),

        // Right: results
        e("div", { style: { display: "flex", flexDirection: "column", gap: "16px" } },

          alreadyPaid
            ? e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "28px", textAlign: "center" } },
                e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "18px", fontWeight: 700, color: "#9ec97e" } }, "🎉 You're debt-free!")
              )
            : !paymentCoversInterest
            ? e("div", { style: { background: "#141414", border: "1px solid #c9502a33", borderRadius: "4px", padding: "28px", textAlign: "center" } },
                e("div", { style: { fontSize: "10px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#c9502a", marginBottom: "12px" } }, "⚠ Payment Too Low"),
                e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "16px", color: "#f0e6d3", lineHeight: 1.5 } }, "Your payment doesn't cover the monthly interest of " + fmtShort(balance * monthlyRate) + ". Increase your payment to start reducing the balance.")
              )
            : e(React.Fragment, null,
                // Payoff time + total interest
                e("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" } },
                  e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px 24px", textAlign: "center" } },
                    e("div", { style: { fontSize: "10px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#8a8a8a", marginBottom: "10px" } }, "Debt-Free In"),
                    e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "28px", fontWeight: 900, color: "#c9a96e", letterSpacing: "-0.02em" } },
                      years > 0 ? years + "y " : "", remainingMonths + "m"
                    ),
                    e("div", { style: { fontSize: "10px", color: "#555", marginTop: "6px" } }, months + " payments")
                  ),
                  e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px 24px", textAlign: "center" } },
                    e("div", { style: { fontSize: "10px", letterSpacing: "0.2em", textTransform: "uppercase", color: "#8a8a8a", marginBottom: "10px" } }, "Total Interest"),
                    e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "28px", fontWeight: 900, color: "#c97e7e", letterSpacing: "-0.02em" } }, fmtShort(totalInterestPaid)),
                    e("div", { style: { fontSize: "10px", color: "#555", marginTop: "6px" } }, "total paid: " + fmtShort(totalPaid))
                  )
                ),

                // Interest vs principal bar
                e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px 24px" } },
                  e("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "12px" } },
                    e("div", { style: { fontSize: "10px", letterSpacing: "0.15em", color: "#8a8a8a", textTransform: "uppercase" } }, "Cost Breakdown"),
                    e("div", { style: { fontFamily: "'Playfair Display', serif", fontSize: "18px", fontWeight: 900, color: "#c97e7e" } },
                      totalPaid > 0 ? ((totalInterestPaid / totalPaid) * 100).toFixed(0) + "% interest" : "—"
                    )
                  ),
                  e("div", { style: { height: "6px", background: "#1e1e1e", borderRadius: "3px", overflow: "hidden", display: "flex" } },
                    e("div", { style: { height: "100%", width: (totalPaid > 0 ? (balance / totalPaid) * 100 : 50) + "%", background: "#3a3020" } }),
                    e("div", { style: { height: "100%", flex: 1, background: "linear-gradient(90deg, #c97e7e, #c9502a)" } })
                  ),
                  e("div", { style: { display: "flex", gap: "16px", marginTop: "8px", fontSize: "10px" } },
                    e("span", { style: { color: "#5a5040" } }, "■ Principal: " + fmtShort(balance)),
                    e("span", { style: { color: "#c97e7e" } }, "■ Interest: " + fmtShort(totalInterestPaid))
                  )
                ),

                // Balance over time chart
                monthData.length > 0 && e("div", { style: { background: "#141414", border: "1px solid #1e1e1e", borderRadius: "4px", padding: "20px" } },
                  e("div", { style: { fontSize: "10px", letterSpacing: "0.15em", color: "#8a8a8a", textTransform: "uppercase", marginBottom: "12px" } }, "Remaining Balance Over Time"),
                  e(BarChart, { data: monthData.map(d => ({ ...d, value: d.value })).reverse(), colorStart: 0, colorEnd: 15 }),
                  e("div", { style: { display: "flex", justifyContent: "space-between", marginTop: "8px", fontSize: "10px", color: "#555" } },
                    e("span", null, "Now"), e("span", null, "Halfway"), e("span", null, "Paid off")
                  )
                )
              )
        )
      );
    }

    // ── Root App ──
    function App() {
      const [tab, setTab] = useState("calc");
      const e = React.createElement;

      return e("div", { style: { minHeight: "100vh", background: "#0e0e0e", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" } },
        e("div", { style: { width: "100%", maxWidth: "800px" } },
          e("div", { style: { marginBottom: "32px", borderLeft: "3px solid #c9a96e", paddingLeft: "20px" } },
            e("h1", { style: { fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px, 5vw, 42px)", fontWeight: 900, color: "#f0e6d3", letterSpacing: "-0.03em", lineHeight: 1 } }, "Financial", e("br"), "Calculator")
          ),
          e("div", { style: { borderBottom: "1px solid #1e1e1e", marginBottom: "28px", overflowX: "auto" } },
            e("div", { style: { display: "flex", minWidth: "max-content" } },
              e("button", { className: "tab-btn" + (tab === "calc" ? " active" : ""), onClick: () => setTab("calc") }, "Compound Interest"),
              e("button", { className: "tab-btn" + (tab === "goal" ? " active" : ""), onClick: () => setTab("goal") }, "Savings Goal"),
              e("button", { className: "tab-btn" + (tab === "debt" ? " active" : ""), onClick: () => setTab("debt") }, "Debt Payoff")
            )
          ),
          tab === "calc" ? e(CalcTab, null) : tab === "goal" ? e(GoalTab, null) : e(DebtTab, null)
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
